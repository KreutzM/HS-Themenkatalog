# Repository-provided example config for Codex CLI.
# Observed with codex-cli 0.118.0: Codex auto-loads ~/.codex/config.toml,
# not this repository-local file. Copy or merge values into ~/.codex/config.toml
# or pass equivalent CLI flags to activate them.

model = "gpt-5.4"
model_reasoning_effort = "medium"
model_verbosity = "medium"

approval_policy = "untrusted"
sandbox_mode = "workspace-write"

project_doc_max_bytes = 32768

[sandbox_workspace_write]
network_access = false

[profiles.review]
model = "gpt-5.4"
approval_policy = "never"
sandbox_mode = "read-only"
model_reasoning_effort = "medium"

[profiles.research]
model = "gpt-5.4"
approval_policy = "on-request"
sandbox_mode = "read-only"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
web_search = "live"
